<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#080808">
    <title>Member Account | Legendary Auto Spa</title>
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header" aria-label="Legendary Auto Spa member account">
      <div class="brand-lockup">
        <img class="brand-mark-image" src="assets/icon.svg" alt="" aria-hidden="true">
        <div>
          <p class="eyebrow">Member Account</p>
          <h1>Legendary Auto Spa</h1>
        </div>
      </div>
      <a class="member-link" href="index.html">Book wash</a>
    </header>

    <main class="member-main">
      <section class="admin-panel" id="memberAuthPanel">
        <div class="step-header">
          <p class="eyebrow">Members</p>
          <h2>Sign in or create an account</h2>
        </div>
        <form id="memberAuthForm" class="admin-login">
          <label>
            Phone number
            <input id="memberPhone" type="tel" autocomplete="tel" required placeholder="(555) 123-4567">
          </label>
          <label>
            Password
            <input id="memberPassword" type="password" autocomplete="current-password" required placeholder="Password">
          </label>
          <div class="wizard-controls">
            <button class="primary-button" type="submit" data-auth-mode="signin">Sign in</button>
            <button class="secondary-button" type="button" id="createMemberButton">Create account</button>
          </div>
        </form>
        <p class="form-status" id="memberStatus" role="status"></p>
      </section>

      <section class="admin-panel hidden" id="memberDashboard">
        <div class="admin-toolbar">
          <div>
            <p class="eyebrow">Member Portal</p>
            <h2 id="memberTitle">Member dashboard</h2>
          </div>
          <button class="secondary-button" id="memberLogoutButton" type="button">Log out</button>
        </div>

        <div class="member-tabs" role="tablist" aria-label="Member account sections">
          <button class="member-tab active" type="button" data-member-tab="vehicles">Saved vehicles</button>
          <button class="member-tab" type="button" data-member-tab="requests">Recent requests</button>
        </div>

        <section class="member-tab-panel" id="memberVehiclesPanel">
          <div id="memberVehicles" class="request-list"></div>
        </section>

        <section class="member-tab-panel hidden" id="memberRequestsPanel">
          <div id="memberRequests" class="request-list"></div>
        </section>
      </section>
    </main>

    <script src="member.js"></script>
  </body>
</html>
