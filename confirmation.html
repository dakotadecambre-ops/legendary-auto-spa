<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#080808">
    <title>Request Submitted | Legendary Auto Spa</title>
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header" aria-label="Legendary Auto Spa confirmation">
      <div class="brand-lockup">
        <img class="brand-mark-image" src="assets/icon.svg" alt="" aria-hidden="true">
        <div>
          <p class="eyebrow">Legendary Auto Spa</p>
          <h1>Request Submitted</h1>
        </div>
      </div>
      <a class="member-link" href="index.html">New request</a>
    </header>

    <main class="confirmation-main">
      <section class="confirmation-card">
        <div class="checkmark" aria-hidden="true">✓</div>
        <p class="eyebrow">Submitted</p>
        <h2>Your request was submitted.</h2>
        <p id="confirmationReference">Legendary Auto Spa will review your request and follow up shortly.</p>
        <div class="wizard-controls">
          <a class="primary-button link-button" href="index.html">Book another wash</a>
          <a class="secondary-button link-button" href="member.html">Member account</a>
        </div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const ref = params.get("ref");
      if (ref) {
        document.querySelector("#confirmationReference").textContent = `Confirmation #${ref}. Legendary Auto Spa will review your request and follow up shortly.`;
      }
    </script>
  </body>
</html>
