<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#080808">
    <title>Legendary Admin Setup</title>
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
  </head>
  <body>
    <header class="app-header" aria-label="Legendary Auto Spa admin setup">
      <div class="brand-lockup">
        <img class="brand-mark-image" src="assets/icon.svg" alt="" aria-hidden="true">
        <div>
          <p class="eyebrow">Admin Setup</p>
          <h1>Legendary Auto Spa</h1>
        </div>
      </div>
      <a class="admin-link" href="admin.html">Admin login</a>
    </header>

    <main class="admin-main">
      <section class="admin-hero">
        <img src="assets/legendary-brand.svg" alt="Legendary Auto Spa">
        <div>
          <p class="eyebrow">First Admin</p>
          <h2>Create an approved backend login.</h2>
        </div>
      </section>

      <section class="admin-panel">
        <div class="step-header">
          <p class="eyebrow">Secure Setup</p>
          <h2>Use your setup key</h2>
        </div>
        <div class="health-grid setup-preflight" id="setupPreflight" aria-live="polite">
          <article class="health-card warn">
            <h3>Checking deployment</h3>
            <p>Confirming this site can reach the setup backend before you create an admin login.</p>
            <small>Run /deployment-check if this stays here.</small>
          </article>
        </div>
        <form id="setupAdminForm" class="admin-login">
          <label>
            Setup key
            <input id="setupKey" type="password" autocomplete="off" required placeholder="ADMIN_SETUP_KEY from Netlify">
          </label>
          <label>
            Admin email
            <input id="setupEmail" type="email" autocomplete="username" required placeholder="you@example.com">
          </label>
          <label>
            Admin password
            <input id="setupPassword" type="password" autocomplete="new-password" required minlength="10" placeholder="At least 10 characters">
          </label>
          <input id="setupRole" type="hidden" value="admin">
          <button class="primary-button" id="setupSubmitButton" type="submit">Create admin login</button>
        </form>
        <p class="form-status" id="setupStatus" role="status"></p>
        <p class="form-status"><a href="deployment-check.html">Open deployment check</a></p>
      </section>
    </main>

    <script src="setup-admin.js"></script>
  </body>
</html>
