[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/setup-admin"
  to = "/setup-admin.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/admin.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/setup-admin.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/setup-admin.js"
  [headers.values]
    Cache-Control = "no-store"
