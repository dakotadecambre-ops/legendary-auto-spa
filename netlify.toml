[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/setup-admin"
  to = "/setup-admin.html"
  status = 200

[[redirects]]
  from = "/deployment-check"
  to = "/deployment-check.html"
  status = 200

[[redirects]]
  from = "/member"
  to = "/member.html"
  status = 200

[[redirects]]
  from = "/member-portal"
  to = "/member-portal.html"
  status = 200

[[redirects]]
  from = "/create-member"
  to = "/create-member.html"
  status = 200

[[redirects]]
  from = "/member-settings"
  to = "/member-settings.html"
  status = 200

[[redirects]]
  from = "/confirmation"
  to = "/confirmation.html"
  status = 200

[[redirects]]
  from = "/rebook-confirm"
  to = "/rebook-confirm.html"
  status = 200

[[redirects]]
  from = "/disclosures"
  to = "/disclosures.html"
  status = 200

[[redirects]]
  from = "/admin-payments"
  to = "/admin-payments.html"
  status = 200

[[redirects]]
  from = "/capture-success"
  to = "/capture-success.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/admin.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/setup-admin.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/setup-admin.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/deployment-check.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/deployment-check.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/build-info.json"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/member.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/member-portal.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/member-portal.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/create-member.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/member-settings.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/confirmation.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/rebook-confirm.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/disclosures.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/admin-payments.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/admin-payments.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/capture-success.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/capture-success.js"
  [headers.values]
    Cache-Control = "no-store"
