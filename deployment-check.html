<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#080808">
    <title>Legendary Deployment Check</title>
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
  </head>
  <body>
    <header class="app-header" aria-label="Legendary Auto Spa deployment check">
      <div class="brand-lockup">
        <img class="brand-mark-image" src="assets/icon.svg" alt="" aria-hidden="true">
        <div>
          <p class="eyebrow">Deploy Check</p>
          <h1>Legendary Auto Spa</h1>
        </div>
      </div>
      <a class="admin-link" href="setup-admin.html">Admin setup</a>
    </header>

    <main class="admin-main">
      <section class="admin-hero">
        <img src="assets/legendary-brand.svg" alt="Legendary Auto Spa">
        <div>
          <p class="eyebrow">Live Readiness</p>
          <h2>Check whether this domain is serving every required frontend and backend file.</h2>
        </div>
      </section>

      <section class="admin-panel">
        <div class="step-header">
          <p class="eyebrow">Same-domain test</p>
          <h2 id="deployOrigin">Checking deployment...</h2>
        </div>
        <div class="deployment-checks" id="deploymentChecks">
          <p class="empty-state">Running checks...</p>
        </div>
        <p class="form-status" id="deploymentStatus" role="status"></p>
      </section>
    </main>

    <script src="deployment-check.js"></script>
  </body>
</html>
